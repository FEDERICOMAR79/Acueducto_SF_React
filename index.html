    <link rel="stylesheet" crossorigin href="/Acueducto_SF_React/assets/index-BdaHoZ3w.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location));
    </script>
  </body>
